replicaCount: 2

image:
  repository: 590183758430.dkr.ecr.ap-south-1.amazonaws.com/nodejs_app
  tag: v1
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: alb

  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi

  limits:
    cpu: 300m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  minAvailable: 1

config:
  APP_NAME: nodejs-app

livenessProbe:
  path: /health

readinessProbe:
  path: /ready


serviceMonitor:
  enabled: true
  interval: 30s

  path: /metrics

  labels:
    release: monitoring