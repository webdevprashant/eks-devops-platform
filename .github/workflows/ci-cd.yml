name: CI-CD Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Dependencies
      run: npm ci
      working-directory: app

    - name: Run Tests
      run: npm test
      working-directory: app

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      run: |
        docker build -t ${{ vars.ECR_REPOSITORY }}:${{ github.sha }} ./app

    - name: Trivy Scan
      uses: aquasecurity/trivy-action@0.28.0
      with:
        image-ref: ${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
        severity: HIGH,CRITICAL
        exit-code: 1

    - name: Tag Image
      run: |
        docker tag \
        ${{ vars.ECR_REPOSITORY }}:${{ github.sha }} \
        ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}

    - name: Push Image
      run: |
        docker push \
        ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ github.sha }}
  
    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ vars.EKS_CLUSTER_NAME }}

    - name: Helm Upgrade
      run: |
        helm upgrade --install nodejs-app ./helm/nodejs-app \
          --set image.repository=${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }} \
          --set image.tag=${{ github.sha }}
      
    - name: Verify Rollout
      run: |
        kubectl rollout status deployment/nodejs-app \
          --timeout=300s

    - name: Health Check
      run: |
        kubectl get pods
        kubectl get svc
        kubectl get ingress